services:
  # ── NuCRM Application ────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nucrm-app
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_SSL: "${DATABASE_SSL:-false}"
      DATABASE_POOL_SIZE: "${DATABASE_POOL_SIZE:-3}"
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NODE_ENV: production
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:3000}"
      SETUP_KEY: ${SETUP_KEY}
      REDIS_URL: ${REDIS_URL}
      CRON_SECRET: ${CRON_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SENTRY_ENABLE: "false"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://0.0.0.0:3000/api/health || exit 1"]
      interval: 30s
      timeout: 60s
      retries: 20
      start_period: 1200s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Background Worker ────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: nucrm-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_SSL: "${DATABASE_SSL:-false}"
      DATABASE_POOL_SIZE: "${DATABASE_POOL_SIZE:-2}"
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: ${REDIS_URL}
      CRON_SECRET: ${CRON_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NODE_ENV: production
      SENTRY_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('ioredis').createClient().ping().then(() => process.exit(0)).catch(() => process.exit(1))\" || exit 1"]
      interval: 30s
      timeout: 60s
      retries: 10
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
